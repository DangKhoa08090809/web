<!DOCTYPE html>
<html lang="vi">
    <head>
        <meta charset="UTF-8" />
        <title>ECU System</title>
        <link rel="stylesheet" href="test.css" />
    </head>
    <body>
        <!-- Top Menu -->
        <div class="navbar">
            <button>Tên NSX</button>
            <button>Feedback</button>
            <button>Help</button>
            <button>Setting</button>
            <button>About System</button>
        </div>

        <!-- Main Layout -->
        <div class="container">
            <!-- Left (Dashboards) -->
            <div class="left">
                <div class="card statistic">Statistic</div>
                <div class="bottom-cards">
                    <div class="card small-card">Alerts</div>
                    <div class="card small-card">Maintenance</div>
                </div>
            </div>

            <!-- Right (System Info) -->
            <div class="right">
                <h1>HỆ THỐNG GIÁM SÁT XE MÁY</h1>
                <p>
                    Tích hợp AI, thông báo đẩy, thời gian thực,<br />
                    giao diện thân thiện.
                </p>
            </div>
        </div>
    </body>
</html>
